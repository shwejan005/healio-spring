# Server
server.port=8080

# H2 Database (switch to PostgreSQL/MySQL for production)
spring.datasource.url=jdbc:h2:mem:healio
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Clerk JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URL:https://classic-polliwog-60.clerk.accounts.dev}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:AIzaSyDaud21nHeRnso6qRb-yeKPbdrf0aadix4}

# CORS
app.cors.allowed-origins=http://localhost:3000
